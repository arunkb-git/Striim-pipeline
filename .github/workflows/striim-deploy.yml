name: Deploy Striim TQL

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      branch:
        description: 'Git branch to checkout and deploy from'
        required: false
        default: ''
      environment:
        description: 'GitHub Environment to deploy to'
        required: false
        default: ''
      drop_applications:
        description: 'Comma-separated list of applications to drop before deployment'
        required: false
        default: ''
      force_drop_all:
        description: 'Drop all changed applications before deployment'
        type: boolean
        required: false
        default: false

jobs:
  resolve:
    runs-on:
      - self-hosted
      - label-6

    outputs:
      environment: ${{ steps.resolve_env.outputs.environment }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || github.ref_name }}

      - name: Ensure Python is available
        shell: powershell
        run: |
          where python
          python --version

      - name: Verify Python and pip
        shell: powershell
        run: |
          python -m ensurepip --upgrade
          python -m pip --version

      - name: Upgrade pip
        shell: powershell
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        shell: powershell
        run: python -m pip install -r .github/scripts/requirements.txt

      - name: Resolve deployment environment
        id: resolve_env
        shell: powershell
        run: |
          $branch = "${{ github.event.inputs.branch }}"
          if (-not $branch -or $branch.Trim().Length -eq 0) {
            $branch = "${{ github.ref_name }}"
          }
          $override = "${{ github.event.inputs.environment }}"

          $args = @(
            ".github/scripts/resolve_environment.py",
            "--config",
            ".github/striim-deploy-settings.yml",
            "--branch",
            $branch
          )

          if ($override -and $override.Trim().Length -gt 0) {
            $args += @("--environment", $override)
          }

          $envName = & python @args
          Write-Host "Resolved deployment environment: $envName"
          "environment=$envName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  deploy:
    needs: resolve

    runs-on:
      - self-hosted
      - label-6

    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch != '' && github.event.inputs.branch || github.ref_name }}

      - name: Ensure Python is available
        shell: powershell
        run: |
          where python
          python --version

      - name: Install dependencies
        shell: powershell
        run: python -m pip install -r .github/scripts/requirements.txt

      - name: Identify Changed Files
        id: identify_changes
        shell: powershell
        run: python .github/scripts/detect_changes.py

      - name: Show Changed TQL Files
        if: steps.identify_changes.outputs.has_changes == 'true'
        shell: powershell
        run: |
          Write-Host "Changed TQL files detected:"
          $files = "${{ steps.identify_changes.outputs.changed_files }}"
          foreach ($line in $files -split "`n") {
            if ($line.Trim()) {
              Write-Host "- $($line.Trim())"
            }
          }

      - name: Deploy Changed TQL Files
        if: steps.identify_changes.outputs.has_changes == 'true'
        continue-on-error: true
        shell: powershell
        run: >-
          python .github/scripts/deploy_striim.py
          --config ".github/striim-deploy-settings.yml"
          --files "${{ steps.identify_changes.outputs.changed_files }}"
          --branch "${{ github.event.inputs.branch != '' && github.event.inputs.branch || github.ref_name }}"
          ${{ github.event.inputs.drop_applications != '' && format('--drop-applications "{0}"', github.event.inputs.drop_applications) || '' }}
          ${{ github.event.inputs.force_drop_all == 'true' && '--force-drop-all' || '' }}
        env:
          STRIIM_BASE_URL: ${{ secrets.STRIIM_BASE_URL }}
          STRIIM_USERNAME: ${{ secrets.STRIIM_USERNAME }}
          STRIIM_PASSWORD: ${{ secrets.STRIIM_PASSWORD }}
          DB_CONNECTION_URL: ${{ secrets.DB_CONNECTION_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: No TQL changes found
        if: steps.identify_changes.outputs.has_changes != 'true'
        shell: powershell
        run: Write-Host "No changed TQL file found. Deployment not required."