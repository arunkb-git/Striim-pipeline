
name: Deploy Striim TQL

on:
  push:
    branches:
      - 'production'
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment to deploy to (leave blank to derive from the branch)'
        required: false
        default: ''
      drop_applications:
        description: 'Comma-separated list of applications to drop before deployment'
        required: false
        default: ''
      force_drop_all:
        description: 'Drop all changed applications before deployment'
        type: boolean
        required: false
        default: false

jobs:
  resolve:
    runs-on:
      - self-hosted
      - label-6
    outputs:
      environment: ${{ steps.resolve_env.outputs.environment }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/scripts/requirements.txt

      - name: Resolve deployment environment
        id: resolve_env
        shell: pwsh
        run: |
          $branch = "${{ github.ref_name }}"
          $override = "${{ github.event.inputs.environment }}"
          $resolved = python .github/scripts/resolve_environment.py `
            --config ".github/striim-deploy-settings.yml" `
            --branch $branch

          if ($override -and $override.Trim().Length -gt 0) {
            $resolved = $override
          }

          Write-Host "Resolved deployment environment: $resolved"
          "environment=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  deploy:
    needs: resolve
    runs-on:
      - self-hosted
      - label-6
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/scripts/requirements.txt

      - name: Identify Changed Files
        id: identify_changes
        shell: pwsh
        run: |
          python .github/scripts/detect_changes.py

      - name: Deploy Changed TQL Filess
        if: steps.identify_changes.outputs.has_changes == 'true'
        shell: pwsh
        run: >-
          python .github/scripts/deploy_striim.py
          --config ".github/striim-deploy-settings.yml"
          --files "${{ steps.identify_changes.outputs.changed_files }}"
          --branch "${{ github.ref_name }}"
          ${{ github.event.inputs.drop_applications != '' && format('--drop-applications "{0}"', github.event.inputs.drop_applications) || '' }}
          ${{ github.event.inputs.force_drop_all == 'true' && '--force-drop-all' || '' }}
        env:
          STRIIM_BASE_URL: ${{ secrets.STRIIM_BASE_URL }}
          STRIIM_USERNAME: ${{ secrets.STRIIM_USERNAME }}
          STRIIM_PASSWORD: ${{ secrets.STRIIM_PASSWORD }}