name: Striim TQL CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-tql:
    runs-on:
      - self-hosted
      - Windows
      - X64
      - label-6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate TQL files
        shell: powershell
        run: |
          $tqlFiles = Get-ChildItem -Path "tql/" -Filter "*.tql" -Recurse
          if ($tqlFiles.Count -eq 0) {
            Write-Error "No .tql files found in tql/ folder"
            exit 1
          }
          Write-Host "Found $($tqlFiles.Count) TQL file(s)"

          foreach ($file in $tqlFiles) {
            $content = Get-Content $file.FullName -Raw
            if ($content -notmatch "CREATE APPLICATION") {
              Write-Error "Missing CREATE APPLICATION in $($file.Name)"; exit 1
            }
            if ($content -notmatch "END APPLICATION") {
              Write-Error "Missing END APPLICATION in $($file.Name)"; exit 1
            }
            if ($content -match "password\s*=\s*['""][^'""]{3,}") {
              Write-Warning "Possible plaintext password in $($file.Name)"
            }
            Write-Host "$($file.Name) is valid"
          }

  deploy:
    name: Deploy TQL to Striim
    runs-on:
      - self-hosted
      - Windows
      - X64
      - label-6
    needs: validate-tql
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    env:
      STRIIM_HOST: ${{ github.ref == 'refs/heads/main' && vars.STRIIM_PROD_HOST || vars.STRIIM_STAGING_HOST }}
      STRIIM_PASSWORD: ${{ github.ref == 'refs/heads/main' && secrets.STRIIM_PASSWORD_PROD || secrets.STRIIM_PASSWORD_STAGING }}
      STRIIM_PORT: ${{ vars.STRIIM_PORT || '9080' }}
      STRIIM_USER: ${{ vars.STRIIM_USER || 'admin' }}
      STRIIM_APPS: ${{ vars.STRIIM_APPS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tear down existing apps
        shell: powershell
        run: |
          $baseUrl = "http://$env:STRIIM_HOST:$env:STRIIM_PORT/api/v2"
          $cred    = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$env:STRIIM_USER:$env:STRIIM_PASSWORD"))
          $headers = @{ Authorization = "Basic $cred" }
          $apps    = $env:STRIIM_APPS -split ";"

          foreach ($app in $apps) {
            $app = $app.Trim()
            if (-not $app) { continue }

            try {
              $status = (Invoke-RestMethod "$baseUrl/applications/$app" -Headers $headers -Method Get).status
            } catch {
              if ($_.Exception.Response.StatusCode -eq 404) { Write-Host "  [$app] not found, skipping."; continue }
              throw
            }

            if ($status -in @("RUNNING","DEPLOYED")) {
              Invoke-RestMethod "$baseUrl/applications/$app/stop" -Headers $headers -Method Put
              Write-Host "  [$app] stopped"
            }
            if ($status -notin @("CREATED","NOT_FOUND")) {
              Invoke-RestMethod "$baseUrl/applications/$app/undeploy" -Headers $headers -Method Put
              Write-Host "  [$app] undeployed"
            }
            Invoke-RestMethod "$baseUrl/applications/$app" -Headers $headers -Method Delete
            Write-Host "  [$app] deleted"
          }

      - name: Import, deploy and start apps
        shell: powershell
        run: |
          $baseUrl = "http://$env:STRIIM_HOST:$env:STRIIM_PORT/api/v2"
          $cred    = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$env:STRIIM_USER:$env:STRIIM_PASSWORD"))
          $headers = @{ Authorization = "Basic $cred" }
          $apps    = $env:STRIIM_APPS -split ";"

          foreach ($app in $apps) {
            $app = $app.Trim()
            if (-not $app) { continue }
            $appName = $app.Split(".")[-1]
            $tqlPath = "tql/$appName.tql"

            if (-not (Test-Path $tqlPath)) { Write-Error "TQL file not found: $tqlPath"; exit 1 }

            Invoke-RestMethod "$baseUrl/applications" -Headers ($headers + @{ "Content-Type" = "text/plain" }) -Method Post -Body (Get-Content $tqlPath -Raw)
            Invoke-RestMethod "$baseUrl/applications/$app/deploy" -Headers $headers -Method Put
            Invoke-RestMethod "$baseUrl/applications/$app/start"  -Headers $headers -Method Put
            Write-Host "  [$app] imported, deployed and started"
          }

      - name: Verify apps are RUNNING
        shell: powershell
        run: |
          $baseUrl  = "http://$env:STRIIM_HOST:$env:STRIIM_PORT/api/v2"
          $cred     = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$env:STRIIM_USER:$env:STRIIM_PASSWORD"))
          $headers  = @{ Authorization = "Basic $cred" }
          $apps     = $env:STRIIM_APPS -split ";"
          $timeout  = 120; $interval = 5; $elapsed = 0

          while ($elapsed -lt $timeout) {
            $pending = @()
            foreach ($app in $apps) {
              $app = $app.Trim()
              if (-not $app) { continue }
              try { $status = (Invoke-RestMethod "$baseUrl/applications/$app" -Headers $headers -Method Get).status }
              catch { $status = "ERROR" }
              if ($status -ne "RUNNING") { $pending += "$app($status)" }
            }

            if ($pending.Count -eq 0) {
              Write-Host "All applications RUNNING - deployment successful!"
              exit 0
            }
            Write-Host "  Waiting... ($elapsed s) Pending: $($pending -join ', ')"
            Start-Sleep -Seconds $interval
            $elapsed += $interval
          }

          Write-Error "Apps did not reach RUNNING within $timeout s: $($pending -join ', ')"
          exit 1